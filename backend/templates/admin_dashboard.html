{% extends "sqladmin/layout.html" %}

{% block content %}
<div class="col-12 mb-2">
    <h2 class="page-title">
        <i class="fa-solid fa-chart-line me-2"></i> UAIFU Admin Center
    </h2>
    <div class="text-secondary">Огляд активності та статистика гри в реальному часі</div>
</div>

<!-- Stat Cards -->
<div class="col-sm-6 col-lg-3">
    <div class="card">
        <div class="card-body">
            <div class="subheader">Користувачі</div>
            <div class="h1 mb-0">{{ stats.total_users }}</div>
        </div>
    </div>
</div>
<div class="col-sm-6 col-lg-3">
    <div class="card">
        <div class="card-body">
            <div class="subheader">Персонажі</div>
            <div class="h1 mb-0">{{ stats.total_cards }}</div>
        </div>
    </div>
</div>
<div class="col-sm-6 col-lg-3">
    <div class="card">
        <div class="card-body">
            <div class="subheader">Всього спінів</div>
            <div class="h1 mb-0">{{ stats.total_spins }}</div>
        </div>
    </div>
</div>
<div class="col-sm-6 col-lg-3">
    <div class="card">
        <div class="card-body">
            <div class="subheader">Status</div>
            <div class="h1 mb-0 text-success">✅ Online</div>
        </div>
    </div>
</div>
{% endblock %}
